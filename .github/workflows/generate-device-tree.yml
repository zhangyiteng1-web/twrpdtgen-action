name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'boot.img 或 recovery.img 的直链下载地址'
        required: true
        type: string
      device_manufacturer:
        description: '设备制造商（如 xiaomi）'
        required: true
        type: string
      device_codename:
        description: '设备代号（如 beryllium）'
        required: true
        type: string
      api_level:
        description: 'API 级别（如 22 对应安卓 5.1，33 对应安卓 13）'
        required: false
        type: string
        default: '22'
      push_to_repo:
        description: '是否推送到独立仓库'
        required: false
        type: boolean
        default: false
      repo_name:
        description: '目标仓库名称（如 android_device_xiaomi_beryllium）'
        required: false
        type: string

env:
  OUTPUT_DIR: output

jobs:
  generate-tree:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio aria2
          pip install twrpdtgen

      - name: Download image with aria2
        run: |
          mkdir -p images
          aria2c -x 16 -s 16 -k 1M \
                 --max-tries=10 \
                 --retry-wait=5 \
                 --timeout=120 \
                 --continue=true \
                 -o images/input.img \
                 "${{ github.event.inputs.image_url }}"

      - name: Generate device tree
        run: |
          python scripts/generate_tree.py \
            --image images/input.img \
            --output ${{ env.OUTPUT_DIR }} \
            --api-level ${{ github.event.inputs.api_level }} \
            --manufacturer "${{ github.event.inputs.device_manufacturer }}" \
            --codename "${{ github.event.inputs.device_codename }}"

      - name: Upload device tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-tree-${{ github.event.inputs.device_codename }}
          path: ${{ env.OUTPUT_DIR }}/

      - name: Create release (if not pushing to repo)
        if: ${{ !github.event.inputs.push_to_repo }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: device-tree-${{ github.event.inputs.device_codename }}-${{ github.run_number }}
          name: "Device Tree for ${{ github.event.inputs.device_manufacturer }} ${{ github.event.inputs.device_codename }}"
          body: |
            ## 自动生成的 TWRP 设备树
            - **设备**: ${{ github.event.inputs.device_manufacturer }} ${{ github.event.inputs.device_codename }}
            - **API 级别**: ${{ github.event.inputs.api_level }}
            - **生成时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            - **工具**: twrpdtgen
          files: |
            ${{ env.OUTPUT_DIR }}/*

      - name: Push to separate repository
        if: ${{ github.event.inputs.push_to_repo && github.event.inputs.repo_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TEMP_DIR=$(mktemp -d)
          cp -r ${{ env.OUTPUT_DIR }}/* $TEMP_DIR/
          cd $TEMP_DIR
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated device tree for ${{ github.event.inputs.device_codename }}"
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/${{ github.event.inputs.repo_name }}.git
          git push -f origin main || git push -f origin master
