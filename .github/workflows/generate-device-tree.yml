name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'boot.img 或 recovery.img 的直链下载地址'
        required: true
        type: string
      device_manufacturer:
        description: '设备制造商（仅用于仓库命名，建议小写无空格）'
        required: true
        type: string
      device_codename:
        description: '设备代号（仅用于仓库命名，建议小写无空格）'
        required: true
        type: string
      api_level:
        description: 'API 级别（必填，如 22 对应安卓 5.1）'
        required: true
        type: string
      push_to_repo:
        description: '是否推送到独立仓库（勾选后自动创建/推送）'
        required: false
        type: boolean
        default: false
      repo_name:
        description: '目标仓库名称（可选，留空则自动生成 android_device_{制造商}_{代号}）'
        required: false
        type: string

env:
  OUTPUT_DIR: output

jobs:
  generate-tree:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio aria2
          pip install twrpdtgen

      - name: Download image with aria2
        run: |
          mkdir -p images
          aria2c -x 16 -s 16 -k 1M \
                 --max-tries=10 \
                 --retry-wait=5 \
                 --timeout=120 \
                 --continue=true \
                 -o images/input.img \
                 "${{ github.event.inputs.image_url }}"

      - name: Generate device tree
        run: |
          python scripts/generate_tree.py \
            --image images/input.img \
            --output ${{ env.OUTPUT_DIR }} \
            --api-level ${{ github.event.inputs.api_level }} \
            --manufacturer "${{ github.event.inputs.device_manufacturer }}" \
            --codename "${{ github.event.inputs.device_codename }}"

      - name: Upload device tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-tree-${{ github.event.inputs.device_codename }}
          path: ${{ env.OUTPUT_DIR }}/

      - name: Create release (if not pushing to repo)
        if: ${{ !github.event.inputs.push_to_repo }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: device-tree-${{ github.event.inputs.device_codename }}-${{ github.run_number }}
          name: "Device Tree for ${{ github.event.inputs.device_manufacturer }} ${{ github.event.inputs.device_codename }}"
          body: |
            ## 自动生成的 TWRP 设备树
            - **设备**: ${{ github.event.inputs.device_manufacturer }} ${{ github.event.inputs.device_codename }}
            - **API 级别**: ${{ github.event.inputs.api_level }}
            - **生成时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            - **工具**: twrpdtgen
          files: |
            ${{ env.OUTPUT_DIR }}/*

      - name: Push to separate repository
        if: ${{ github.event.inputs.push_to_repo }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 获取输入
          MANUFACTURER="${{ github.event.inputs.device_manufacturer }}"
          CODENAME="${{ github.event.inputs.device_codename }}"
          API_LEVEL="${{ github.event.inputs.api_level }}"
          
          # 确定目标仓库名称
          if [ -n "${{ github.event.inputs.repo_name }}" ]; then
            REPO_NAME="${{ github.event.inputs.repo_name }}"
          else
            CLEAN_MANUFACTURER=$(echo "$MANUFACTURER" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
            CLEAN_CODENAME=$(echo "$CODENAME" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
            REPO_NAME="android_device_${CLEAN_MANUFACTURER}_${CLEAN_CODENAME}"
          fi
          
          # ----- 根据 API 级别精确映射到 Android 版本分支 -----
          # 定义映射表（API -> 版本）
          case $API_LEVEL in
            19|20|21) BRANCH="android-4.4" ;;
            22)       BRANCH="android-5.1" ;;
            23)       BRANCH="android-6.0" ;;
            24)       BRANCH="android-7.0" ;;
            25)       BRANCH="android-7.1" ;;
            26)       BRANCH="android-8.0" ;;
            27)       BRANCH="android-8.1" ;;
            28)       BRANCH="android-9.0" ;;
            29)       BRANCH="android-10.0" ;;
            30)       BRANCH="android-11.0" ;;
            31)       BRANCH="android-12.0" ;;
            32)       BRANCH="android-12.1" ;;
            33)       BRANCH="android-13.0" ;;
            *)        BRANCH="android-${API_LEVEL}" ;;  # 未知 API 直接使用 android-<数字>
          esac
          echo "使用的分支: ${BRANCH}"
          
          # 检查并创建仓库
          echo "检查仓库 ${REPO_NAME} 是否存在..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository_owner }}/${REPO_NAME}")
          
          if [ "$HTTP_STATUS" -eq 404 ]; then
            echo "仓库不存在，正在创建..."
            curl -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/user/repos" \
              -d "{\"name\":\"${REPO_NAME}\",\"description\":\"TWRP device tree for ${MANUFACTURER} ${CODENAME}\",\"private\":false,\"auto_init\":false}"
            echo "仓库创建成功！"
          else
            echo "仓库已存在，继续推送..."
          fi
          
          # ----- 动态查找实际生成的设备树目录 -----
          OUTPUT_DIR="${{ env.OUTPUT_DIR }}"
          echo "查找 ${OUTPUT_DIR} 下生成的设备树目录..."
          
          DEVICE_TREE_PATH=$(find "$OUTPUT_DIR" -mindepth 2 -maxdepth 2 -type d -print0 | xargs -0 ls -td | head -n1)
          
          if [ -z "$DEVICE_TREE_PATH" ]; then
            echo "错误：未找到生成的设备树目录"
            echo "当前 output 目录结构："
            ls -la "$OUTPUT_DIR"
            find "$OUTPUT_DIR" -type d
            exit 1
          fi
          
          echo "找到设备树目录：${DEVICE_TREE_PATH}"
          
          TEMP_DIR=$(mktemp -d)
          cp -r "${DEVICE_TREE_PATH}/." "$TEMP_DIR/"
          
          cd $TEMP_DIR
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Auto-generated TWRP device tree for ${CODENAME}"
          
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/${REPO_NAME}.git
          git push -f origin HEAD:${BRANCH}
